# Overhead camera (primary view for board reading). Scaffold (  0).
# Camera observation keys are STABLE — never rename them silently.
cameras:
  overhead:
    key: observation.images.overhead
    index: "<CAMERA_INDEX>"   # discover with: lerobot-find-cameras opencv
    width: 640                # defaults; adjust to the actual camera
    height: 480
    fps: 30
