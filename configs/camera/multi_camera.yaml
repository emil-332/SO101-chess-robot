# Multi-camera setup. Camera setup RESOLVED (2026-06-04): overhead + side/oblique.
# Overhead feeds square grounding; side/oblique (~45-60 deg) feeds piece
# classification; wrist is optional and unused by perception. Keys are STABLE —
# never rename them silently.
cameras:
  overhead:
    key: observation.images.overhead
    index: "<CAMERA_INDEX>"
    role: square_grounding
  side:
    key: observation.images.side
    index: "<CAMERA_INDEX>"
    role: piece_classification   # mount at ~45-60 deg (oblique)
  wrist:
    key: observation.images.wrist
    index: "<CAMERA_INDEX>"
    role: optional               # not used by perception
